services:
  goonbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goonbot
    restart: always
    expose:
      - "8000"
    volumes:
      - goonbot_data:/app/data
    environment:
      # Discord Bot Credentials
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      GUILD_ID: ${GUILD_ID:-1417556208767733823}
      ADMIN_USER_ID: ${ADMIN_USER_ID:-988470489909432334}
      SECRET_CMD_PASSWORD: ${SECRET_CMD_PASSWORD:-}
      REDEPLOY_PASSWORD: ${REDEPLOY_PASSWORD:-}
      WEBHOOK_DEP: ${WEBHOOK_DEP:-}

      # Local Ollama AI Instance
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      OLLAMA_SYSTEM_PROMPT: ${OLLAMA_SYSTEM_PROMPT:-}

      # Dashboard Web Server
      PORT: ${PORT:-8000}
      DASHBOARD_BASE_URL: ${DASHBOARD_BASE_URL:-http://localhost:8000}

volumes:
  goonbot_data:
    driver: local
